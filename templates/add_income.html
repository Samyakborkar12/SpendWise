<!DOCTYPE html>
<html>
<head>
    <title>Add Income - SpendWise</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <div class="form-container">

        <h2>💵 Add Income</h2>

        <form method="POST">

            <div class="form-group">
                <input type="number"
                       name="amount"
                       placeholder="Income Amount"
                       required>
            </div>

            <div class="form-group">
                <input type="text"
                       name="source"
                       placeholder="Income Source"
                       required>
            </div>

            <div class="form-group">
                <input type="date"
                       name="date"
                       required>
            </div>

            <button class="btn-income" type="submit">
                  💵 Add Income
            </button>

        </form>

        <br>

        <a href="/dashboard">
            ← Back to Dashboard
        </a>

    </div>

</body>
</html>
