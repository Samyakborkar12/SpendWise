<!DOCTYPE html>
<html>
<head>
    <title>Edit Expense</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="form-container">

    <h2>Edit Expense</h2>

    <form method="POST">

        <input type="number"
               name="amount"
               value="{{ expense[1] }}"
               required>

        <br><br>

        <input type="text"
               name="category"
               value="{{ expense[2] }}"
               required>

        <br><br>

        <input type="date"
               name="date"
               value="{{ expense[3] }}"
               required>

        <br><br>

        <input type="text"
               name="description"
               value="{{ expense[4] }}">

        <br><br>

        <button type="submit">
            Update Expense
        </button>

    </form>

</div>

</body>
</html>
